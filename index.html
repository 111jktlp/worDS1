<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>worDS — Vocabolario Inglese</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Press+Start+2P&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --shell:#eef0f3;
    --shell-hi:#ffffff;
    --shell-lo:#c7ccd3;
    --shell-edge:#a6acb5;
    --shell-shadow:#8b919b;

    --screen-a:#dcedff;
    --screen-b:#f3f9ff;
    --ink:#1f2d44;
    --ink-soft:#5b6b85;

    --blue:#3f7fe0;
    --blue-dark:#2c5bb0;
    --red:#e5484d;
    --red-dark:#b8353a;
    --yellow:#f2c94c;
    --yellow-dark:#c99e1f;
    --green:#3fb87f;
    --green-dark:#279463;
    --purple:#9b6fd6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 12px;

    background-color:#eef3fa;

    background-image:
        linear-gradient(rgba(145,165,195,.16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(145,165,195,.16) 1px, transparent 1px);

    background-size:24px 24px;

    font-family:'Nunito',sans-serif;
}

  .ds-wrap{
    width:min(100%,420px);
    margin:auto;
}

  /* ===================== CONSOLE SHELL ===================== */
  .ds-console{
    position:relative;
    background:
      linear-gradient(155deg, var(--shell-hi) 0%, var(--shell) 45%, var(--shell-lo) 100%);
    border-radius:34px;
    padding:16px 16px 20px;
    box-shadow:
      0 24px 0 -6px var(--shell-shadow),
      0 30px 50px -12px rgba(0,0,0,.6),
      inset 0 2px 0 rgba(255,255,255,.7),
      inset 0 -6px 10px rgba(0,0,0,.08);
  }

  .cam-dot{
    width:8px; height:8px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #6b7686, #2a2f38 70%);
    margin:0 auto 10px;
    box-shadow:0 0 0 3px rgba(0,0,0,.05);
  }

  /* ===================== SCREEN BEZELS ===================== */
  .screen-bezel{
    position:relative;
    background:linear-gradient(160deg, var(--shell-lo), var(--shell-edge));
    border-radius:16px;
    padding:10px;
    box-shadow:
      inset 0 2px 4px rgba(255,255,255,.5),
      inset 0 -3px 6px rgba(0,0,0,.15);
  }

  .screen{
    position:relative;
    aspect-ratio: 4 / 3.1;
    border-radius:8px;
    overflow:hidden;
    background:linear-gradient(165deg, var(--screen-a), var(--screen-b));
    box-shadow:
      inset 0 0 0 3px rgba(0,0,0,.35),
      inset 0 3px 10px rgba(0,0,0,.25);
    display:flex;
    flex-direction:column;
  }

  .screen-shine{
    position:absolute; inset:0;
    background:linear-gradient(115deg, rgba(255,255,255,.5) 0%, rgba(255,255,255,0) 26%);
    pointer-events:none;
    border-radius:8px;
  }

  /* ===================== TOP SCREEN CONTENT ===================== */
  .statusbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:7px 9px 5px;
    font-family:'Press Start 2P', monospace;
    font-size:.5rem;
    color:var(--ink-soft);
    position:relative;
    z-index:2;
  }
  .brand{ color:var(--blue-dark); letter-spacing:.5px;}
  .hud{ display:flex; gap:8px; }
  .hud-item{ display:flex; align-items:center; gap:3px; }
  .hud-item b{ color:var(--ink); font-size:.6rem; }
  .hud-item.ok{ color:var(--green-dark); }
  .hud-item.wrong{ color:var(--red-dark); }
  .hud-item.streak{ color:var(--yellow-dark); }

  .stage{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:4px 14px;
    position:relative;
    z-index:2;
  }

  .pos-tag{
    display:inline-block;
    font-family:'Press Start 2P', monospace;
    font-size:.45rem;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:4px 9px;
    border-radius:20px;
    color:#fff;
    margin-bottom:10px;
    opacity:0;
    transform:translateY(6px);
    animation: fadeUp .4s ease forwards;
  }
  .pos-noun{ background:var(--blue); }
  .pos-verb{ background:var(--red); }
  .pos-adjective{ background:var(--yellow-dark); }
  .pos-adverb{ background:var(--purple); }
  .pos-other{ background:var(--ink-soft); }

  .word{
    font-family:'Baloo 2', cursive;
    font-weight:800;
    font-size:clamp(1.5rem, 8vw, 2.1rem);
    line-height:1.1;
    color:var(--ink);
    margin:0 0 8px;
    word-break:break-word;
    opacity:0;
    animation: fadeUp .45s ease forwards;
    animation-delay:.05s;
  }

  @keyframes fadeUp{ to{ opacity:1; transform:translateY(0); } }

  .feedback{
    min-height:34px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-family:'Nunito',sans-serif;
    font-weight:700;
    font-size:.68rem;
    color:var(--ink-soft);
    padding-bottom:4px;
  }
  .feedback .fb-row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center; }
  .feedback .msg b{ color:var(--ink); }
  .feedback .tokens{ font-size:.62rem; }
  .feedback .ok-tok{ color:var(--green-dark); }
  .feedback .dup-tok{ color:var(--ink-soft); }
  .feedback .wrong-tok{ color:var(--red); }
  .feedback .answerkey{
    font-size:.56rem;
    color:var(--ink-soft);
    line-height:1.35;
    max-width:100%;
  }
  .feedback .answerkey b{ color:var(--ink); font-weight:800; }

  .mark{ width:24px; height:24px; flex:none; }
  .mark path{
    fill:none;
    stroke-width:8;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:80;
    stroke-dashoffset:80;
    animation: draw .4s ease forwards;
  }
  .mark.ok path{ stroke:var(--green-dark); }
  .mark.no path{ stroke:var(--red); }
  @keyframes draw{ to{ stroke-dashoffset:0; } }

  .deckbar{
    text-align:center;
    font-family:'Press Start 2P', monospace;
    font-size:.4rem;
    color:var(--ink-soft);
    opacity:.7;
    padding:0 8px 8px;
    position:relative;
    z-index:2;
  }

  /* ===================== HINGE ===================== */
  .ds-hinge{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 22px;
  }
  .speaker-grille{
    display:grid;
    grid-template-columns:repeat(3, 5px);
    grid-auto-rows:5px;
    gap:4px;
  }
  .speaker-grille span{
    width:5px; height:5px;
    border-radius:50%;
    background:var(--shell-edge);
    box-shadow:inset 0 1px 1px rgba(0,0,0,.3);
  }
  .hinge-center{ display:flex; align-items:center; gap:6px; }
  .power-led{
    width:7px; height:7px;
    border-radius:50%;
    background:var(--green-dark);
    box-shadow:0 0 6px 2px rgba(63,184,127,.7);
    transition:background .2s ease, box-shadow .2s ease;
  }
  .power-led.off-streak{
    background:var(--shell-edge);
    box-shadow:none;
  }
  .mic-label{
    font-family:'Press Start 2P', monospace;
    font-size:.4rem;
    color:var(--shell-shadow);
  }

  /* ===================== BOTTOM AREA ===================== */
  .ds-bottom-half{
    display:grid;
    grid-template-columns:52px 1fr 60px;
    align-items:center;
    gap:6px;
  }

  .bottom-screen{
    padding:10px 12px 12px;
    justify-content:center;
    gap:8px;
  }

  .touch-hint{
    text-align:center;
    font-family:'Press Start 2P', monospace;
    font-size:.36rem;
    color:var(--ink-soft);
    opacity:.65;
    position:relative;
    z-index:2;
    line-height:1.5;
  }

  input#answer{
    position:relative;
    z-index:2;
    width:100%;
    background:#ffffff;
    border:none;
    border-radius:10px;
    font-family:'Baloo 2', cursive;
    font-weight:700;
    font-size:1rem;
    color:var(--ink);
    padding:10px 12px;
    outline:none;
    text-align:center;
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,.18),
      inset 0 0 0 2px #cfe0f5;
  }
  input#answer::placeholder{ color:#a9b6c8; font-weight:600; }
  input#answer:focus{ box-shadow: inset 0 2px 4px rgba(0,0,0,.18), inset 0 0 0 2px var(--blue); }
  input#answer.correct{ box-shadow: inset 0 2px 4px rgba(0,0,0,.18), inset 0 0 0 2px var(--green-dark); color:var(--green-dark); }
  input#answer.wrong{ box-shadow: inset 0 2px 4px rgba(0,0,0,.18), inset 0 0 0 2px var(--red); color:var(--red); }
  input#answer.neutral{ box-shadow: inset 0 2px 4px rgba(0,0,0,.18), inset 0 0 0 2px var(--ink-soft); }

  .touch-buttons{
    position:relative;
    z-index:2;
    display:flex;
    gap:6px;
  }

  .tbtn{
    flex:1;
    font-family:'Press Start 2P', monospace;
    font-size:.45rem;
    letter-spacing:.5px;
    color:var(--ink);
    background:linear-gradient(180deg, #ffffff, #dfe7f2);
    border:none;
    border-radius:8px;
    padding:9px 4px;
    cursor:pointer;
    box-shadow:
      0 2px 0 #b9c4d4,
      inset 0 1px 0 rgba(255,255,255,.8);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .tbtn:active{
    transform:translateY(2px);
    box-shadow:0 0 0 #b9c4d4, inset 0 1px 0 rgba(255,255,255,.8);
  }
  .tbtn-primary{
    color:#fff;
    background:linear-gradient(180deg, #59a0ff, var(--blue-dark));
    box-shadow:0 2px 0 #23478f, inset 0 1px 0 rgba(255,255,255,.4);
  }
  .tbtn-primary:active{ box-shadow:0 0 0 #23478f, inset 0 1px 0 rgba(255,255,255,.4); }

  /* ===================== D-PAD ===================== */
  .dpad{
    position:relative;
    width:52px; height:52px;
    justify-self:center;
  }
  .dpad-btn{
    position:absolute;
    background:linear-gradient(180deg, #dde2e8, var(--shell-edge));
    box-shadow:inset 0 1px 1px rgba(255,255,255,.6), inset 0 -2px 2px rgba(0,0,0,.15);
    cursor:pointer;
  }
  .dpad-btn.up{ top:0; left:18px; width:16px; height:20px; border-radius:4px 4px 0 0; }
  .dpad-btn.down{ bottom:0; left:18px; width:16px; height:20px; border-radius:0 0 4px 4px; }
  .dpad-btn.left{ left:0; top:18px; width:20px; height:16px; border-radius:4px 0 0 4px; }
  .dpad-btn.right{ right:0; top:18px; width:20px; height:16px; border-radius:0 4px 4px 0; }
  .dpad-center{
    position:absolute; top:16px; left:16px;
    width:20px; height:20px;
    background:linear-gradient(180deg, #e7ebef, var(--shell-lo));
    border-radius:3px;
  }
  .dpad-btn:active{ filter:brightness(.9); }

  /* ===================== ABXY ===================== */
  .abxy{
    position:relative;
    width:60px; height:60px;
    justify-self:center;
  }
  .face-btn{
    position:absolute;
    width:22px; height:22px;
    border-radius:50%;
    border:none;
    font-family:'Press Start 2P', monospace;
    font-size:.5rem;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 2px 0 rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.4);
  }
  .face-btn:active{ transform:translateY(2px); box-shadow:inset 0 1px 0 rgba(255,255,255,.4); }
  .x-btn{ top:0; left:19px; background:linear-gradient(180deg, #6fa4ee, var(--blue-dark)); }
  .y-btn{ top:19px; left:0; background:linear-gradient(180deg, #5bcf98, var(--green-dark)); }
  .a-btn{ top:19px; right:0; background:linear-gradient(180deg, #ef7377, var(--red-dark)); }
  .b-btn{ bottom:0; left:19px; background:linear-gradient(180deg, #f4d777, var(--yellow-dark)); }

  /* ===================== START / SELECT ===================== */
  .start-select{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:14px;
  }
  .pill-btn{
    font-family:'Press Start 2P', monospace;
    font-size:.4rem;
    color:var(--ink-soft);
    background:linear-gradient(180deg, #e2e6eb, var(--shell-lo));
    padding:5px 10px;
    border-radius:20px;
    box-shadow:0 2px 0 var(--shell-edge), inset 0 1px 0 rgba(255,255,255,.6);
    cursor:pointer;
  }
  .pill-btn:active{ transform:translateY(1px); box-shadow:inset 0 1px 0 rgba(255,255,255,.6); }

 
    
    
    
   /* ===================== Combo popup ===================== */  
    
 .stage{
    position:relative;
}

.combo-popup{
    position:absolute;
    left:50%;
    top:42%;
    transform:translate(-50%,-50%) scale(.5);
    opacity:0;
    pointer-events:none;
    z-index:20;

    text-align:center;

    font-family:'Press Start 2P', monospace;
    color:#ffd94d;
 text-shadow:
    0 2px 0 #7b5600,
    0 0 10px rgba(255,215,0,.7);
}

.combo-popup.show{
    animation:comboPop .9s ease forwards;
}

@keyframes comboPop{

    0%{
        opacity:0;
        transform:translate(-50%,25px) scale(.5);
    }

    20%{
        opacity:1;
        transform:translate(-50%,0) scale(1.25);
    }

    45%{
        transform:translate(-50%,0) scale(1);
    }

    100%{
        opacity:0;
        transform:translate(-50%,-30px) scale(1);
    }

}   
       
    
  /* ===================== MOBILE ===================== */   
    
    
@media (max-width:768px){

    html{
        font-size:15px;
    }

    body{
        align-items:flex-start;
        padding-top:12px;
    }

    .ds-console{
        transform:scale(.88);
        transform-origin:center top;
    }

    .word{
        font-size:clamp(1.3rem,6.5vw,1.9rem);
    }

    input#answer{
        font-size:.95rem;
    }

    .tbtn{
        padding:9px 4px;
    }

}



@media (max-width:430px){

    body{
        align-items:flex-start;
        padding:8px 6px;
    }

    .ds-console{
        transform:scale(.92);
        transform-origin:center top;
        padding:10px;
        border-radius:22px;
    }

    .screen{
        aspect-ratio:4/3;
    }

    .ds-bottom-half{
        grid-template-columns:38px 1fr 38px;
        gap:6px;
    }

    .dpad,
    .abxy{
        transform:scale(.74);
    }

}



</style>
</head>
<body>

<div class="ds-wrap">
  <div class="ds-console">
    <div class="cam-dot"></div>

    <div class="screen-bezel top-bezel">
      <div class="screen top-screen">
        <div class="statusbar">
          <span class="brand">worDS</span>
          <span class="hud">
            <span class="hud-item ok">PT <b id="okCount">0</b></span>
            <span class="hud-item wrong wrong-count">✗ <b>0</b></span>
            <span class="hud-item streak">⚡ <b id="streakCount">0</b></span>
          </span>
        </div>
        <div class="stage">
          <span class="pos-tag" id="posTag"></span>
          <h2 class="word" id="wordEl"></h2>
          <div class="feedback" id="feedback"></div>
           <div id="comboPopup" class="combo-popup"></div>    
        </div>
        <div class="deckbar" id="deckStatus"></div>
      </div>
      <div class="screen-shine"></div>
    </div>

    <div class="ds-hinge">
      <div class="speaker-grille"><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <div class="hinge-center">
        <span class="power-led" id="powerLed"></span>
        <span class="mic-label">POWER</span>
      </div>
      <div class="speaker-grille"><span></span><span></span><span></span><span></span><span></span><span></span></div>
    </div>

    <div class="ds-bottom-half">
      <div class="dpad">
        <div class="dpad-btn up"></div>
        <div class="dpad-btn down"></div>
        <div class="dpad-btn left"></div>
        <div class="dpad-btn right"></div>
        <div class="dpad-center"></div>
      </div>

      <div class="screen-bezel bottom-bezel">
        <div class="screen bottom-screen" id="answerForm">
          <div class="touch-hint">✎ scrivi le traduzioni, separate da virgola</div>
          <input id="answer" type="text" placeholder="traduzione1, traduzione2…" autocomplete="off" autocapitalize="off" spellcheck="false">
          <div class="touch-buttons">
            <button type="button" class="tbtn tbtn-primary" id="checkBtn">VERIFICA</button>
            <button type="button" class="tbtn" id="skipBtn">Bohhh</button>
            <button type="button" class="tbtn" id="resetBtn">RESET</button>
          </div>
        </div>
        <div class="screen-shine"></div>
      </div>

      <div class="abxy">
        <button type="button" class="face-btn x-btn" id="xBtn">X</button>
        <button type="button" class="face-btn y-btn" id="yBtn">Y</button>
        <button type="button" class="face-btn a-btn" id="aBtn">A</button>
        <button type="button" class="face-btn b-btn" id="bBtn">B</button>
      </div>
    </div>

    <div class="start-select">
      <div class="pill-btn" id="selectBtn">SELECT</div>
      <div class="pill-btn" id="startBtn">START</div>
    </div>
  </div>
</div>

  "bass":    [["basso"], ["pesce persico","persico"]],
  "blast":   [["esplosione"], ["raffica","folata"]],
  "besides": [["inoltre", "per di più", "anche"]],   
  "top":     [["cima","vetta"], ["trottola"]],
  "bat":     [["pipistrello"], ["mazza da baseball","mazza"]],
  "deck":    [["ponte"], ["mazzo di carte","mazzo"]],
  "cabinet": [["armadietto"], ["consiglio dei ministri","gabinetto"]],
  "terrific": [["fantastico", "meraviglioso", "stupendo"]],
  "carve":    [["scolpire"], ["incidere","intagliare"]],
  "strictly": [["rigorosamente", "severamente", "strettamente"]],  
  "bargain": [["affare", "occasione"]],  
  "exceed": [["eccedere", "superare"]],  
  "default": [["default", "predefinito"]],
  "outbreak": [["epidemia", "eruzione", "scoppio", "attacco"]],    
    
    
};

function buildMeanings(entry){
  const key = entry.w + '|' + entry.p;
  if(MEANING_OVERRIDES[key]) return MEANING_OVERRIDES[key];
  if(MEANING_OVERRIDES[entry.w]) return MEANING_OVERRIDES[entry.w];
  return [ entry.t.split(/\/|,/).map(s=>s.trim()).filter(Boolean) ];
}

const WORDS = RAW_WORDS.map(e => ({
  w: e.w,
  p: e.p,
  meanings: buildMeanings(e)
}));

let deck = [];
let current = null;
let points = 0, totalWrong = 0, streak = 0;
let awaitingNext = false;

const wordEl = document.getElementById('wordEl');
const posTag = document.getElementById('posTag');
const answerInput = document.getElementById('answer');
const feedback = document.getElementById('feedback');
const okCount = document.getElementById('okCount');
const streakCount = document.getElementById('streakCount');
const deckStatus = document.getElementById('deckStatus');
const skipBtn = document.getElementById('skipBtn');
const resetBtn = document.getElementById('resetBtn');
const checkBtn = document.getElementById('checkBtn');

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function newDeck(){
  deck = shuffle(WORDS);
  updateDeckStatus();
}

function updateDeckStatus(){
  deckStatus.textContent = (WORDS.length - deck.length) + ' / ' + WORDS.length + ' parole viste in questa partita';
}

function normalize(str){
  return str
    .toLowerCase()
    .trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[’‘]/g, "'")
    .replace(/\s+/g,' ');
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

function nextWord(){
  if(deck.length === 0) newDeck();
  current = deck.pop();
  updateDeckStatus();
  awaitingNext = false;

  wordEl.textContent = current.w;
  const cls = POS_CLASS[current.p] || 'pos-other';
  posTag.className = 'pos-tag ' + cls;
  posTag.textContent = POS_LABEL[current.p] || current.p;

  // restart entry animations
  wordEl.style.animation = 'none';
  posTag.style.animation = 'none';
  void wordEl.offsetWidth;
  wordEl.style.animation = '';
  posTag.style.animation = '';

  answerInput.value = '';
  answerInput.className = '';
  answerInput.disabled = false;
  feedback.innerHTML = '';
  checkBtn.textContent = 'Verifica';
  answerInput.focus();
}

function markSVG(isOk){
  if(isOk){
    return '<svg class="mark ok" viewBox="0 0 40 40"><path d="M8 21 L16 29 L32 11"/></svg>';
  }
  return '<svg class="mark no" viewBox="0 0 40 40"><path d="M10 10 L30 30 M30 10 L10 30"/></svg>';
}

    
 function showCombo(level){

    const popup = document.getElementById("comboPopup");

    popup.innerHTML =
        "🔥 COMBO x" + level +
        "<br><br>" +
        "BONUS +" + Math.floor(level/3);

    popup.classList.remove("show");

    void popup.offsetWidth;

    popup.classList.add("show");
}      
    
    
    
    
function submitAnswer(){
  if(awaitingNext){
    nextWord();
    return;
  }
  const raw = answerInput.value;
  if(!raw.trim()){ answerInput.focus(); return; }

  // le risposte multiple si separano con la virgola (o "/"),
  // così le traduzioni composte da più parole restano intatte
  const tokens = raw.split(/[,\/]+/).map(s=>s.trim()).filter(Boolean);

  const meanings = current.meanings;
  const matchedIdx = new Set();
  const results = [];
  let newCorrect = 0, wrongCount = 0;

  tokens.forEach(tok=>{
    const norm = normalize(tok);
    let foundIdx = -1;
    for(let i=0;i<meanings.length;i++){
      if(meanings[i].some(s => normalize(s) === norm)){ foundIdx = i; break; }
    }
    if(foundIdx === -1){
      results.push({token:tok, status:'wrong'});
      wrongCount++;
    } else if(matchedIdx.has(foundIdx)){
      results.push({token:tok, status:'duplicate'});
    } else {
      matchedIdx.add(foundIdx);
      results.push({token:tok, status:'new'});
      newCorrect++;
    }
  });

const delta = newCorrect - wrongCount;

totalWrong += wrongCount;

if (wrongCount === 0 && newCorrect > 0) {

    streak++;

    const comboBonus = Math.floor(streak / 3);

    points += delta + comboBonus;

    if(streak % 3 === 0){
        showCombo(streak);
    }

}
    
else {
    points += delta;

    if (wrongCount > 0) {
        streak = 0;
    }
}

  okCount.textContent = points;
  document.querySelector('.wrong-count b').textContent = totalWrong;
  streakCount.textContent = streak;

  answerInput.disabled = true;
  awaitingNext = true;
  checkBtn.textContent = 'Avanti →';
  answerInput.className = delta > 0 ? 'correct' : (delta < 0 ? 'wrong' : 'neutral');

  const tokensHTML = results.map(r=>{
    const sym = r.status === 'new' ? '✓' : (r.status === 'duplicate' ? '≈' : '✗');
    const cls = r.status === 'new' ? 'ok-tok' : (r.status === 'duplicate' ? 'dup-tok' : 'wrong-tok');
    return '<span class="' + cls + '">' + sym + ' ' + escapeHtml(r.token) + '</span>';
  }).join(' &nbsp; ');

  const answerKey = meanings.map(g => g.join(' / ')).join('  •  ');

  const markHTML = delta > 0 ? markSVG(true) : (delta < 0 ? markSVG(false) : '');
  const deltaLabel = delta > 0 ? ('+' + delta) : String(delta);

  feedback.innerHTML =
    '<div class="fb-row">' + markHTML +
      '<span class="msg tokens">' + tokensHTML + ' &nbsp; (<b>' + deltaLabel + '</b>)</span>' +
    '</div>' +
    '<div class="answerkey">Significati di <b>' + escapeHtml(current.w) + '</b>: ' + escapeHtml(answerKey) + '</div>';
}

checkBtn.addEventListener('click', function(){
  submitAnswer();
});

answerInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    e.preventDefault();
    submitAnswer();
  }
});

function revealSkipped(){
  if(awaitingNext){ nextWord(); return; }

  const meanings = current.meanings;

  points -= 1;
  totalWrong += 1;
  streak = 0;

  okCount.textContent = points;
  document.querySelector('.wrong-count b').textContent = totalWrong;
  streakCount.textContent = streak;

  answerInput.value = '';
  answerInput.disabled = true;
  answerInput.className = 'wrong';
  awaitingNext = true; 
  checkBtn.textContent = 'Avanti →';   
  skipBtn.textContent = 'Bohhh';

  const answerKey = meanings.map(g => g.join(' / ')).join('  •  ');
  const markHTML = markSVG(false);   
    
  feedback.innerHTML =
    '<div class="fb-row">' + markHTML +
      '<span class="msg tokens">Parola saltata &nbsp; (<b>-1</b>)</span>' +
    '</div>' +
    '<div class="answerkey">Significati di <b>' + escapeHtml(current.w) + '</b>: ' + escapeHtml(answerKey) + '</div>';
}

skipBtn.addEventListener('click', revealSkipped);

resetBtn.addEventListener('click', function(){
  points = 0; totalWrong = 0; streak = 0;
  okCount.textContent = points;
  document.querySelector('.wrong-count b').textContent = totalWrong;
  streakCount.textContent = streak;
  newDeck();
  nextWord();
});

newDeck();
nextWord();

  // Collegamenti extra puramente estetici/comodi per i tasti fisici del "DS",
  // che richiamano le funzioni già definite sopra senza toccarne la logica.
  document.getElementById('aBtn').addEventListener('click', () => document.getElementById('checkBtn').click());
  document.getElementById('bBtn').addEventListener('click', () => document.getElementById('skipBtn').click());
  document.getElementById('yBtn').addEventListener('click', () => document.getElementById('resetBtn').click());
  document.getElementById('xBtn').addEventListener('click', () => document.getElementById('answer').focus());
  document.getElementById('selectBtn').addEventListener('click', () => document.getElementById('resetBtn').click());
  document.getElementById('startBtn').addEventListener('click', () => document.getElementById('checkBtn').click());

  // LED di potenza: si spegne leggermente se non c'è una serie di risposte corrette in corso
  const _streakEl = document.getElementById('streakCount');
  const _led = document.getElementById('powerLed');
  new MutationObserver(() => {
    _led.classList.toggle('off-streak', _streakEl.textContent === '0');
  }).observe(_streakEl, { childList:true, characterData:true, subtree:true });
</script>
